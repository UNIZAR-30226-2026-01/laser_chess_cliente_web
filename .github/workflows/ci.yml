on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone backend repo
        run: git clone https://github.com/UNIZAR-30226-2026-01/laser_chess_backend.git backend

      - name: Levantar base de datos
        run: |
          cd backend
          make postgres
        env:
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: laser_chess_db
          DB_PORT: 5432

      - name: Instalar golang
        uses: actions/setup-go@v6
        with: 
          go-version: '1.25.7'
    
      - name: Instalar sqlc
        uses: sqlc-dev/setup-sqlc@v3
        with:
          sqlc-version: '1.30.0'

      - name: Esperar a que postgresql termine de levantarse
        run: |
          cd backend
          until docker exec postgres_db pg_isready -U $DB_USER
          do
            sleep 2
          done
        env:
          DB_USER: user
         
      - name: Aplicar esquema y hacer la build
        run: |
          cd backend
          make apply-schema
          make build
        env:
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: laser_chess_db
          DB_PORT: 5432
          DB_URL: "postgresql://user:password@localhost:5432/laser_chess_db?sslmode=disable"
          GIN_MODE: release

      - name: Arrancar el backend
        run: |
          cd backend
          make run
      
      - name: Prueba login frontend
          
      
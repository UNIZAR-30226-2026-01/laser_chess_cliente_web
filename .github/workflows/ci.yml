on:
  push:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './lasser_chess_web'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './lasser_chess_web/package-lock.json'

      - name: Install Dependencies
        run: |
          npm install
          npm install ws # Instalamos la librería para el servidor mock

      - name: Start Mock Backend
        run: node test-backend.js & # El '&' lo ejecuta en segundo plano

      - name: Build Frontend
        run: npm run build

      - name: Run Frontend Tests
        run: |
          # Aquí ejecutarías tus tests unitarios (Karma/Jest)
          # que verifiquen que al recibir "TB8:B7" la pieza se mueve.
          npm test -- --watch=false --browsers=ChromeHeadless

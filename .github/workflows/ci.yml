name: Test Frontend

on:
  push:
    branches: [ main, paula, mimi ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd laser-chess-web
          npm install
          npm install ws

      - name: Build
        run: |
          cd laser-chess-web
          npm run build
      
      - name: Run Tests
        run: |
          cd laser-chess-web
          npm test

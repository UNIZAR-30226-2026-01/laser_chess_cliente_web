jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Solo activamos cache si estamos 100% seguros del path. 
          # Si falla, comenta estas dos líneas:
          cache: 'npm'
          cache-dependency-path: 'laser_chess_web/package-lock.json'

      - name: Install Dependencies
        run: |
          cd laser_chess_web
          npm install
          npm install ws

      - name: Start Mock Backend
        # Asegúrate de que test-backend.js esté DENTRO de laser_chess_web
        run: node laser_chess_web/test-backend.js & 

      - name: Build Frontend
        run: |
          cd laser_chess_web
          npm run build

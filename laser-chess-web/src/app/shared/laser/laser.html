<div class="laser-container">
  @for (seg of segments(); track $index) {
    <div class="laser-segment"
         [style.left.%]="seg.left"
         [style.top.%]="seg.top"
         [style.width.%]="seg.width"
         [style.height.px]="4"
         [style.transform]="'rotate(' + seg.angle + 'deg)'">
    </div>
  }
</div>

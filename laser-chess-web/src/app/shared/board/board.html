<div class="board">
  @for (y of [].constructor(filas); let row = $index; track row) {
    @for (x of [].constructor(columnas); let col = $index; track col) {

      <div 
        class="cell"
        [class.azul]="isCasillaRestringida(col+1, row+1) === 'azul'"
        [class.rojo]="isCasillaRestringida(col+1, row+1) === 'rojo'"
        [style.gridColumn]="col+1"
        [style.gridRow]="row+1">
      </div>

    }
  }

  @for (p of piezas(); track p.id) {
    @if (p.esMia) {
      <app-pieza 
        #piezaRef
        [initialX]="p.x" 
        [initialY]="p.y" 
        [rotationInput]="p.rotation"
        [cols]="columnas"
        [rows]="filas"
        [tipoPieza]="p.tipoPieza"
        [isCasillaRestringida]="isCasillaRestringida"
        [ocupado]="ocupado"

        (selected)="piezaSeleccionada.emit(piezaRef)"
        (moveRequested)="movimientoSolicitado.emit($event)">
      </app-pieza>

    } @else {
      <app-pieza-rival 
        [x]="p.x" 
        [y]="p.y"
        [tipoPieza]="p.tipoPieza"
        [rotationInput]="p.rotation">
      </app-pieza-rival>
    }
  }

  @if (laserPath().length > 0) {
    <app-laser [path]="laserPath()"></app-laser>
  }
</div>

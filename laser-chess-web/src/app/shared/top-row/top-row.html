<div class="container">
  <div class="lc-title">
    <mat-icon fontSet="material-symbols-outlined">chess_king</mat-icon>
    <span style="margin-left: 10px;">Laserchess</span>
  </div>

  <div class="empty-space"></div>

  <div class="profile-card" (click)="openProfile()">
    <div class="profile-info">
      <div class="info-header">
        <div class="level-and-xp">
          <span class="level-text">Lvl. {{ (userProfile$ | async)?.level }}</span>
          <span class="xp-detail-text"> · {{ xpInfoDetail().current }} / {{ xpInfoDetail().required }}</span>
          <span class="xp-letters">XP</span>
        </div>
        <span class="username">{{ (userProfile$ | async)?.username }}</span>
      </div>

      <div class="xp-container">
        <div class="xp-bar" [style.width.%]="xpPercentage()"></div>
      </div>
    </div>
    <div class="profile-picture">
      @if (avatar()) {
        <img [src]="'assets/vector-art/ProfilePictures/bot' + avatar() + '.svg'" alt="Avatar">
      } @else {
        <div class="avatar-placeholder-large">
          <span class="avatar-icon-large">👤</span>
        </div>
      }
    </div>

  </div>

  <div class="coin-counter">
    <span class="coin-amount">{{ (userProfile$ | async)?.money }}</span>
    <mat-icon fontSet="material-symbols-outlined" class="coin-icon">paid</mat-icon>
  </div>
</div>


<app-popup
  [type]="showProfilePopup() ? 'userInfo' : 'none'"
  [userInfoUser]="selectedUser()"
  [userInfoContext]="'self'"
  [userInfoEloBlitz]="(userProfile$ | async)?.blitzElo ?? 0"
  [userInfoEloRapid]="(userProfile$ | async)?.rapidElo ?? 0"
  [userInfoEloClassic]="(userProfile$ | async)?.classicElo ?? 0"
  [userInfoEloExtended]="(userProfile$ | async)?.extendedElo ?? 0"
  [userInfoXpCurrent]="xpInfoDetail().current"
  [userInfoXpRequired]="xpInfoDetail().required"
  [userInfoXpPercentage]="xpPercentage()"
  (userInfoClose)="closeProfile()">
</app-popup>

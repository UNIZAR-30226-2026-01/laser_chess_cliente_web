<div class="animated-bg"
     [style.backgroundImage]="'url(' + boardState.boardBackgroundUrl() + ')'">
</div>

<div class="page">
  <app-top-row></app-top-row>

  <!-- Popup: información de usuario -->
  <!-- Popup: información de usuario -->
  <app-popup
    [type]="popUP_userInfo() ? 'userInfo' : 'none'"
    [userInfoUser]="selectedUser()"
    [userInfoXpCurrent]="selectedUserXpCurrent()"
    [userInfoXpRequired]="selectedUserXpRequired()"
    [userInfoXpPercentage]="selectedUserXpPercentage()"
    [userInfoContext]="selectedUserContext()"
    [userInfoEloBlitz]="selectedUserEloBlitz()"
    [userInfoEloRapid]="selectedUserEloRapid()"
    [userInfoEloClassic]="selectedUserEloClassic()"
    [userInfoEloExtended]="selectedUserEloExtended()"
    (userInfoClose)="closeUserInfo()"
    (userInfoChallenge)="challengeFromPopup()"
    (userInfoDeleteFriend)="deleteFriend()"
    (userInfoCancelSent)="cancelFriendRequest()"
    (userInfoSendFriendRequest)="sendFriendRequest()">
  </app-popup>

  <!-- Popups de reto (challengeConfig + waiting) -->
  <app-challenge-flow></app-challenge-flow>

  @if(historyState.popUpLimites()) {
  <div id="overlay" class="overlay" (click)="historyState.popUpLimites.set(false)">
    <div class="popup-error" (click)="$event.stopPropagation()">
      {{ historyState.popUpMensaje() }}
      <button (click)="historyState.popUpLimites.set(false)" class="btn-close">Cerrar</button>
    </div>
  </div>
}
  <div class="game-layout">
    <!-- Contenedor que agrupa jugadores y tablero -->
    <div class="game-container">

      <!-- JUGADOR IZQUIERDA -->
      <aside class="side-panel">
        <div class="player_card my-user" [class.active-turn]="!this.historyState.turnoVisual()">
          <div class="timer">{{ timerService.formatTime(miTiempo()) }}</div>
          <img [src]="'assets/vector-art/ProfilePictures/bot' + miAvatar() + '.svg'" alt="Avatar" class="avatar-circle blue">
          <span class="player-name">{{ miNombre() }}</span>
        </div>
      </aside>

      <!-- TABLERO CENTRADO -->
      <main class="main-content">
        <app-board
          [piezas]="listaPiezas"
          [laserPath]="laserPath"
          [columnas]="columnas"
          [filas]="filas"
          [isCasillaRestringida]="gameUtils.isCasillaRestringida.bind(this)"
          [laserStatic]="true"
        ></app-board>

        <div class="controls">
          <button (click)="primero()"><span>| <</span></button>
          <button (click)="anterior()"><span><</span></button>
          <button (click)="siguiente()"><span>></span></button>
          <button (click)="ultimo()"><span>> |</span></button>
        </div>
      </main>

      <!-- JUGADOR DERECHA -->
      <aside class="side-panel">
        <div class="player_card rival" (click)="openUserInfo(historyState.perfilRival())" [class.active-turn]="this.historyState.turnoVisual()">
          <div class="timer">{{ timerService.formatTime(tiempoRival()) }}</div>
          <img [src]="'assets/vector-art/ProfilePictures/bot' + rivalAvatar() + '.svg'" alt="Avatar" class="avatar-circle red">
          <span class="player-name">{{ nombreRival() }}</span>
        </div>
      </aside>

    </div>
  </div>
</div>

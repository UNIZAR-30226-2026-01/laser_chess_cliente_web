<section class="home">


    <app-top-row></app-top-row>

    @if(popUPNotis()){
        <div id="overlay" class="overlay" (click)="popUPNotis.set(false)">
            <div class="popup-solicitudes" (click)="$event.stopPropagation()">
                 @for (reto of solicitudes(); track reto.challenger_id) {
                    <div class="card-reto">
                    <div class="info">
                        <strong>{{ reto.challenger_username }}</strong>
                        <span>Tablero: {{ reto.board }}</span>
                    </div>

                    <div class="tiempo">
                        ⏱️ {{ reto.starting_time }} min + {{ reto.time_increment }}s
                    </div>

                    <button (click)="accept(reto)">Jugar</button>
                    </div>
                } @empty {
                    <div class="no-data">
                    <p>No hay ninguna notificación</p>
                    <span class="loader"></span>
                    </div>
                }
            </div>
            </div>
    }

    <div class="main-section">
        <div class="tablero-placeholder">
            <img src="assets/tablero-placeholder.png">
        </div>
        <div class="game-selection">

        <div class="notif-elo-container">
          <button class="icon-btn icon-notif" type="button" aria-label="Notificaciones" (click)="popUPNotis.set(true)">
              @if (solicitudes().length > 0) {
                <span class="notification-badge">{{ solicitudes().length }}</span>
              }
              <mat-icon fontSet="material-symbols-outlined">all_inbox</mat-icon>
          </button>

          <!-- Lo del elo -->
          <div class="elo-badge-container">
            <div class="elo-text-wrapper">
              <span class="elo-rank-name">{{ eloRankName }}</span>
            </div>

            <div class="elo-circle-wrapper">
              <svg class="progress-ring" viewBox="0 0 120 120">
                <circle class="progress-ring-track" cx="60" cy="60" r="46" stroke-width="12"/>
                <circle class="progress-ring-value" cx="60" cy="60" r="46" stroke-width="12"
                        [attr.stroke-dashoffset]="eloDashOffset"/>
              </svg>
              <mat-icon class="elo-icon-inner" fontSet="material-symbols-outlined">
                masked_transitions_add
              </mat-icon>
            </div>
          </div>
        </div>


        <div class="bottom-row">
            <button class="setting-selector" type="button" aria-label="Cambiar modo de tiempo">
                <div class="setting-content">
                    <mat-icon style="--icon-color: var(--LCBlue)" fontSet="material-symbols-outlined">timer</mat-icon>
                    <span class="setting-label">{{ timeModeLabel }}</span>
                </div>
                <mat-icon fontSet="material-symbols-outlined">expand_more</mat-icon>
            </button>

            <button class="setting-selector" type="button" aria-label="Cambiar tablero">
                <div class="setting-content">
                    <mat-icon style="--icon-color: var(--LCRed)" fontSet="material-symbols-outlined">crossword</mat-icon>
                    <span class="setting-label">Tablero</span>
                </div>
                <mat-icon fontSet="material-symbols-outlined">expand_more</mat-icon>
            </button>
        </div>

        <div class="play-group">
            <a class="play-btn" routerLink="/game">
                PLAY
            </a>
            <button class="trophy-btn" type="button" aria-label="Trofeo">
                <mat-icon fontSet="material-symbols-outlined">emoji_events</mat-icon>
            </button>
        </div>

    </div>
    </div>



</section>

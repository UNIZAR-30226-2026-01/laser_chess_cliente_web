<app-top-row class="main-top-row">
  </app-top-row>

        <div class="title_settings">
            <img src="assets/icons/settings-icon.png" class="icon" alt="">
            <h1>Ajustes</h1>
        </div>

        <div class="settings-content">
            <div class="card_datos">
                <div class="card_datos_header">
                    <h2>Datos personales</h2>
                </div>
                <div class="card_datos_body">
                    <div class="email-row">
                        <span>E-mail:</span>
                        <span class="email-box">example@ex.dom</span>
                    </div>
                    <p class="link" (click)="changePasswd()">Cambiar contraseña</p>
                    <p class="link" (click)="logout()">Cerrar sesión</p>
                    <p class="link" (click)="deleteAccount()">Eliminar cuenta</p>
                </div>
            </div>

            <div class="card_settings">
                <div class="setting-row">
                    <div class="form-check">
                        <label class="form-check-label" for="checkDefault">
                            Música
                        </label>
                        <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                    </div>
                </div>
                <div class="setting-row">
                    <div class="form-check">
                        <label class="form-check-label" for="checkDefault">
                            Efectos de sonido
                        </label>
                        <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                        
                    </div>
                </div>
                <div class="setting-row">
                    <div class="form-check">
                        <label class="form-check-label" for="checkDefault">
                            Notificaciones
                        </label>
                        <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                        
                    </div>
                </div>
            </div>
        </div>

        <div class="accessibility-section">
            <p>Ajustes de accesibilidad</p>
            <div class="access-icon">👤</div>
        </div>

<div class="shop-container">

  @for (section of sections(); track section.title) {
    <div class="shop-section">
      <h2>{{ section.title }}</h2>
      <div class="items-grid">
        @for (item of section.items; track item.id) {
          <div class="shop-card" [class.owned]="item.owned">
            
            <div class="icon">
              <img [src]="item.icon" alt="{{ item.name }}" (error)="item.icon = 'assets/default_item.png'">
            </div>

            <div class="name">{{ item.name }}</div>
            <div class="price">{{ item.price }}</div>
            <div class="requirement"> Nivel {{ item.levelRequisite }}</div>
            @if (!item.owned) {
              <button (click)="buyItem(item)" [disabled]="!canBuy(item)">
                Comprar
              </button>
            } @else {
              <span class="owned-badge"> Propio</span>
            }
          </div>
        }
      </div>
    </div>
  }
</div>
